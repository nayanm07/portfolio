<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">B2C CRM ARM Cover</title>
  <desc id="desc">Feature banner cover image for B2C CRM ARM mobile application project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1726"/>
      <stop offset="100%" stop-color="#123a56"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2537"/>
      <stop offset="100%" stop-color="#1b4f73"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <circle cx="1300" cy="120" r="260" fill="#2aa3ff" opacity="0.08"/>
  <circle cx="220" cy="780" r="280" fill="#6ee7b7" opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="150" y="120" rx="28" ry="28" width="1300" height="660" fill="url(#card)"/>
  </g>

  <text x="220" y="255" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="700" fill="#f5fbff">
    B2C CRM ARM
  </text>
  <text x="220" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#b9ddf7">
    Mobile CRM for Study Abroad and Immigration Teams
  </text>

  <g font-family="Segoe UI, Arial, sans-serif" fill="#d7efff" font-size="24">
    <text x="220" y="390">- One-tap click-to-call and follow-up reminders</text>
    <text x="220" y="435">- Call recording with sentiment and quality insights</text>
    <text x="220" y="480">- Live lead panel during incoming and outgoing calls</text>
    <text x="220" y="525">- Multi-role access with instant team switching</text>
    <text x="220" y="570">- Analytics dashboard for leads, applications, and calls</text>
    <text x="220" y="615">- Student self-service portal with AI counsellor</text>
  </g>

  <g>
    <rect x="1080" y="300" width="250" height="420" rx="26" fill="#07111b" stroke="#6bbbf2" stroke-opacity="0.6"/>
    <rect x="1105" y="350" width="200" height="20" rx="8" fill="#1f4f74"/>
    <rect x="1105" y="390" width="200" height="14" rx="7" fill="#2a6d9a"/>
    <rect x="1105" y="420" width="170" height="14" rx="7" fill="#2a6d9a"/>
    <rect x="1105" y="470" width="200" height="120" rx="14" fill="#12314a"/>
    <rect x="1105" y="610" width="95" height="32" rx="10" fill="#0ea5a5"/>
    <rect x="1210" y="610" width="95" height="32" rx="10" fill="#0284c7"/>
  </g>
</svg>
